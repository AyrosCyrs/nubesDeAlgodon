{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión — Nubes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'inventario/style.css' %}">
    <style>
        :root { --forest-img: url("{% static 'inventario/forest.webp' %}"); }

        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: #111a13;
            border: 1px solid var(--verde-medio);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .login-eyebrow {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--verde-borde);
            margin-bottom: 1rem;
            display: block;
        }

        .login-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--crema-fuerte);
            margin-bottom: 2rem;
            line-height: 1.1;
        }

        .login-card label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .login-card input[type="text"],
        .login-card input[type="password"] {
            background: var(--verde-oscuro);
            border: 1px solid var(--verde-medio);
            color: var(--crema);
            border-radius: 0;
            font-size: 14px;
        }

        .login-card input[type="text"]:focus,
        .login-card input[type="password"]:focus {
            background: var(--verde-oscuro);
            border-color: var(--verde-borde);
            color: var(--crema);
            box-shadow: none;
        }

        .login-divider {
            width: 40px;
            height: 1px;
            background: var(--verde-borde);
            margin-bottom: 2rem;
        }

        .login-footer {
            margin-top: 1.5rem;
            font-size: 12px;
            color: var(--muted);
        }

        .login-footer a {
            color: var(--verde-texto);
            text-decoration: none;
        }

        .login-footer a:hover { color: var(--crema); }
    </style>
</head>
<body>
    <div style="position:fixed; inset:0; z-index:-1;
        background-image: linear-gradient(to bottom, rgba(8,14,10,0.7), rgba(8,14,10,0.92)),
        var(--forest-img);
        background-size: cover; background-position: center;">
    </div>

    <nav>
        <span class="nav-logo">Nubes de Algodón</span>
        <div>
            <a href="{% url 'inventario:inicio' %}">Inicio</a>
            <a href="{% url 'inventario:registro' %}">Registrarse</a>
        </div>
    </nav>

    <div class="login-wrap">
        <div class="login-card fade-in">
            <span class="login-eyebrow">Acceso al sistema</span>
            <h1 class="login-title">Iniciar<br><em>sesión.</em></h1>
            <div class="login-divider"></div>

            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn" style="width:100%; margin-top:1rem;">
                    Entrar →
                </button>
            </form>

            <div class="login-footer">
                ¿No tienes cuenta?
                <a href="{% url 'inventario:registro' %}">Regístrate aquí</a>
            </div>
        </div>
    </div>
</body>
</html>
